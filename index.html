<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sameekshya ❤️ Ankur</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Poppins&display=swap" rel="stylesheet">
</head>

<body>

<!-- INTRO -->
<div id="intro">
  <div class="intro-content">
    <h1>Sameekshya ❤️ Ankur</h1>
    <p>Are Getting Married</p>
    <button onclick="enterSite()">Enter Invitation</button>
  </div>
</div>

<!-- MAIN -->
<div id="mainContent">

<section class="page active">
  <div class="card">
    <h1>Welcome 💌</h1>
    <button onclick="nextPage()">Continue</button>
  </div>
</section>

<section class="page">
  <div class="card">
    <h1>Wedding Dates</h1>
    <p>Haldi: 4 Dec</p>
    <p>Mehendi: 5 Dec</p>
    <p>Wedding: 6 Dec</p>
    <h2 id="countdown"></h2>

    <button onclick="prevPage()">⬅ Back</button>
    <button onclick="nextPage()">Next ➡</button>
  </div>
</section>

<section class="page">
  <div class="card">
    <h1>Location 📍</h1>

    <a href="https://www.google.com/maps/search/?api=1&query=Bhubaneswar" target="_blank">
      <button>Open Map</button>
    </a>

    <button onclick="prevPage()">⬅ Back</button>
    <button onclick="nextPage()">Next ➡</button>
  </div>
</section>

<section class="page">
  <div class="card">
    <h1>RSVP 💌</h1>

    <form action="https://formspree.io/f/mayvlqzv" method="POST">
      <input type="text" name="name" placeholder="Your Name" required>
      <button type="submit">Submit</button>
    </form>

    <button onclick="prevPage()">⬅ Back</button>
    <button onclick="nextPage()">Guest List ➡</button>
  </div>
</section>

<section class="page">
  <div class="card">
    <h1>Guest Confirmation 👥</h1>

    <div id="friendsList"></div>
    <div id="familyList"></div>

    <button onclick="prevPage()">⬅ Back</button>
    <button onclick="saveGuests()">Save</button>
  </div>
</section>

</div>

<script src="script.js"></script>
</body>
</html>
