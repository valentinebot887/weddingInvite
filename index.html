<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sameekshya ❤️ Ankur</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- INTRO -->
<div id="intro">
  <div class="center-box">
    <h1>Sameekshya ❤️ Ankur</h1>
    <p>Are Getting Married</p>
    <button onclick="enterSite()">Enter Invitation</button>
  </div>
</div>

<!-- MAIN -->
<div id="mainContent">

<section class="page active">
  <div class="card">
    <h1>Welcome 💌</h1>
    <button onclick="nextPage()">Continue</button>
  </div>
</section>

<section class="page">
  <div class="card">
    <h1>Wedding Dates</h1>
    <p>Haldi: 4 Dec</p>
    <p>Mehendi: 5 Dec</p>
    <p>Wedding: 6 Dec</p>

    <button onclick="prevPage()">⬅ Back</button>
    <button onclick="nextPage()">Next ➡</button>
  </div>
</section>

<section class="page">
  <div class="card">
    <h1>RSVP 💌</h1>

    <input id="name" placeholder="Your Name">
    <input id="guests" placeholder="Guests">
    
    <select id="status">
      <option>Will Attend</option>
      <option>Will Not Attend</option>
    </select>

    <button onclick="submitRSVP()">Submit</button>

    <p id="successMsg"></p>

    <button onclick="prevPage()">⬅ Back</button>
  </div>
</section>

</div>

<script src="script.js"></script>
</body>
</html>
