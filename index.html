<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sameekshya ❤️ Ankur</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- INTRO -->
<div id="intro">
  <div class="center-box">
    <h1>Sameekshya ❤️ Ankur</h1>
    <p>Are Getting Married</p>
    <button onclick="enterSite()">Enter Invitation</button>
  </div>
</div>

<!-- MAIN -->
<div id="mainContent">

<!-- PAGE 1 -->
<section class="page active">
  <div class="card">
    <h1>Welcome 💌</h1>
    <button onclick="nextPage()">Continue</button>
  </div>
</section>

<!-- PAGE 2 -->
<section class="page">
  <div class="card">
    <h1>Wedding Dates</h1>
    <p>🌼 Haldi: 4 Dec 2026</p>
    <p>💃 Mehendi: 5 Dec 2026</p>
    <p>💍 Wedding: 6 Dec 2026</p>

    <button onclick="prevPage()">⬅ Back</button>
    <button onclick="nextPage()">Next ➡</button>
  </div>
</section>

<!-- PAGE 3 -->
<section class="page">
  <div class="card">
    <h1>Location 📍</h1>
    <a href="https://www.google.com/maps/search/?api=1&query=Bhubaneswar" target="_blank">
      <button>Open Map</button>
    </a>

    <button onclick="prevPage()">⬅ Back</button>
    <button onclick="nextPage()">Next ➡</button>
  </div>
</section>

<!-- PAGE 4 RSVP -->
<section class="page">
  <div class="card">
    <h1>RSVP 💌</h1>

    <input id="name" placeholder="Your Name">
    <input id="guests" placeholder="Number of Guests">

    <select id="status">
      <option>Will Attend</option>
      <option>Will Not Attend</option>
    </select>

    <button onclick="submitRSVP()">Submit</button>

    <p id="successMsg"></p>

    <button onclick="prevPage()">⬅ Back</button>
    <button onclick="nextPage()">Admin ➡</button>
  </div>
</section>

<!-- PAGE 5 ADMIN -->
<section class="page">
  <div class="card">

    <div id="adminLogin">
      <h1>Admin Access 🔐</h1>
      <input type="password" id="adminPin" placeholder="Enter PIN">
      <button onclick="checkAdmin()">Login</button>
    </div>

    <div id="adminPanel" style="display:none;">
      <h1>Dashboard 📊</h1>
      <h3>Total Guests: <span id="total"></span></h3>
      <div id="guestData"></div>
    </div>

    <button onclick="prevPage()">⬅ Back</button>

  </div>
</section>

</div>

<script src="script.js"></script>
</body>
</html>
