<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sameekshya ❤️ Ankur</title>

<link rel="stylesheet" href="style.css">
<script src="script.js" defer></script>
</head>

<body>

<div id="app">

  <div class="page active">
    <div class="card">
      <h1>Welcome 💌</h1>
      <p>Sameekshya & Ankur invite you 💖</p>
      <button onclick="nextPage()">Continue</button>
    </div>
  </div>

  <div class="page">
    <div class="card large-card">
      <h1>Wedding Celebrations</h1>
      <img src="events.png" class="event-img">
      <button onclick="prevPage()">⬅</button>
      <button onclick="nextPage()">➡</button>
    </div>
  </div>

  <div class="page">
    <div class="card">
      <h1>Location 📍</h1>
      <p>Bhubaneswar</p>
      <button onclick="prevPage()">⬅</button>
      <button onclick="nextPage()">➡</button>
    </div>
  </div>

  <div class="page">
    <div class="card">
      <h1>Families ❤️</h1>

      <h3>Bride Family</h3>
      <p>Somendra Das & Aliva Das</p>
      <p>Swapnika Das Babar</p>
      <p>Chirayu Das Babar</p>
      <p>Kuchuuu</p>

      <h3>Groom Family</h3>
      <p>Anant Kumar & Anju Kumari</p>
      <p>Ayush Kumar</p>

      <button onclick="prevPage()">⬅</button>
      <button onclick="nextPage()">➡</button>
    </div>
  </div>

  <div class="page">
    <div class="card">
      <h1>RSVP 💌</h1>

      <input id="name" placeholder="Your Name">
      <input id="guests" placeholder="Guests">

      <button onclick="submitRSVP()">Submit</button>

      <button onclick="prevPage()">⬅</button>
      <button onclick="nextPage()">➡</button>
    </div>
  </div>

  <div class="page">
    <div class="card">
      <h1>Admin 🔐</h1>
      <input id="pin">
      <button onclick="checkAdmin()">Login</button>
      <button onclick="prevPage()">⬅</button>
    </div>
  </div>

</div>

</body>
</html>
