<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sameekshya ❤️ Ankur</title>

<link rel="stylesheet" href="style.css">
<script src="script.js" defer></script>

</head>
<body>

<div class="petals"></div>
<div class="hearts"></div>

<!-- INTRO -->
<div id="intro">
  <div class="center-box">
    <h1>Sameekshya ❤️ Ankur</h1>
    <button onclick="enterSite()">Enter Invitation</button>
  </div>
</div>

<div id="mainContent">

<section class="page active">
  <div class="card">
    <h1>Welcome 💌</h1>
    <button onclick="nextPage()">Continue</button>
  </div>
</section>

<section class="page">

<div class="top-timer">
<span id="days"></span>d :
<span id="hours"></span>h :
<span id="minutes"></span>m :
<span id="seconds"></span>s
</div>

<div class="card big-card">

<h1>Wedding Celebrations</h1>

<div class="events">

<div class="event">
<img src="https://images.unsplash.com/photo-1623609163859-ca93c959b9cf?auto=format&fit=crop&w=500&q=60">
<h3>Haldi</h3>
</div>

<div class="event">
<img src="https://images.unsplash.com/photo-1603575448360-153f093fd0e9?auto=format&fit=crop&w=500&q=60">
<h3>Mehendi</h3>
</div>

<div class="event">
<img src="https://images.unsplash.com/photo-1591604466107-ec97de577aff?auto=format&fit=crop&w=500&q=60">
<h3>Wedding</h3>
</div>

</div>

<button onclick="prevPage()">⬅</button>
<button onclick="nextPage()">➡</button>

</div>
</section>

<section class="page">
  <div class="card">
    <h1>Location</h1>
    <p>Bhubaneswar</p>
  </div>
</section>

<section class="page">
  <div class="card">
    <h1>Confirm Your Presence</h1>

    <input id="name" placeholder="Name">
    <input id="guests" placeholder="Guests">

    <select id="status">
      <option>Will Attend</option>
      <option>Will Not Attend</option>
    </select>

    <button onclick="submitRSVP()">Submit</button>

    <button onclick="nextPage()">Admin</button>
  </div>
</section>

<!-- ADMIN PAGE -->
<section class="page">
  <div class="card">

    <div id="loginBox">
      <h1>Admin Login</h1>
      <input id="pin" placeholder="Enter PIN">
      <button onclick="checkAdmin()">Login</button>
    </div>

    <div id="adminPanel" style="display:none;">
      <h1>Guest List</h1>
      <div id="guestList"></div>
    </div>

  </div>
</section>

</div>

</body>
</html>
