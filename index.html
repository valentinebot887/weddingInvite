<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sameekshya ❤️ Ankur</title>

<link rel="stylesheet" href="style.css">
<script src="script.js" defer></script>
</head>

<body>

<div id="mainContent">

<!-- PAGE 1 -->
<section class="page active">
  <div class="card">
    <h1>Welcome 💌</h1>
    <p>
      Together with their families,<br><br>
      Sameekshya & Ankur invite you<br>
      to celebrate their wedding 💖
    </p>

    <button onclick="nextPage()">Continue</button>
  </div>
</section>

<!-- PAGE 2 -->
<section class="page">
  <div class="card">
    <h1>Wedding Celebrations</h1>
    <img src="events.png" class="img">

    <button onclick="prevPage()">⬅</button>
    <button onclick="nextPage()">➡</button>
  </div>
</section>

<!-- PAGE 3 -->
<section class="page">
  <div class="card">
    <h1>Location 📍</h1>
    <p>Bhubaneswar</p>

    <button onclick="prevPage()">⬅</button>
    <button onclick="nextPage()">➡</button>
  </div>
</section>

<!-- PAGE 4 -->
<section class="page">
  <div class="card">
    <h1>Families ❤️</h1>

    <p><b>Bride:</b> Somendra Das & Aliva Das</p>
    <p>Swapnika Das Babar</p>
    <p>Chirayu Das Babar</p>

    <p><b>Groom:</b> Anant Kumar & Anju Kumari</p>

    <button onclick="prevPage()">⬅</button>
    <button onclick="nextPage()">➡</button>
  </div>
</section>

<!-- PAGE 5 -->
<section class="page">
  <div class="card">
    <h1>RSVP 💌</h1>

    <input id="name" placeholder="Your Name">
    <input id="guests" placeholder="Guests">

    <button onclick="submitRSVP()">Submit</button>

    <button onclick="prevPage()">⬅</button>
  </div>
</section>

</div>

</body>
</html>
